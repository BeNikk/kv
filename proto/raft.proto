syntax = "proto3";
package raft;

message RequestVoteArgs {
    uint64 term = 1; uint64 candidate_id = 2;
    uint64 last_log_index = 3; uint64 last_log_term = 4;
}
message RequestVoteReply { uint64 term = 1; bool vote_granted = 2; }

message LogEntryProto { uint64 term = 1; uint64 index = 2; bytes command = 3; }
message AppendEntriesArgs {
    uint64 term = 1; uint64 leader_id = 2;
    uint64 prev_log_index = 3; uint64 prev_log_term = 4;
    repeated LogEntryProto entries = 5; uint64 leader_commit = 6;
}
message AppendEntriesReply { uint64 term = 1; bool success = 2; }

service RaftRpc {
    rpc RequestVote   (RequestVoteArgs)   returns (RequestVoteReply);
    rpc AppendEntries (AppendEntriesArgs) returns (AppendEntriesReply);
}